name: Test and codecov report
on: [push, pull_request]
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel
      - name: Create fake visdom module
        run: |
          mkdir -p visdom
          echo "class Visdom: pass" > visdom/__init__.py
      - name: Install adv lib with no visdom
        run: python -m pip install --no-deps adv-lib
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Install test requirements
        run: python -m pip install -r requirements-test.txt
      - name: Run tests and collect coverage
        run: python -m pytest --cov src/
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: pralab/secml-torch
